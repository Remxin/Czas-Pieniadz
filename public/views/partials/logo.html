<?php
/**
 * Reusable brand logo (Stitch: hourglass_empty @ primary).
 *
 * Optional vars:
 *   $logoClass  - extra CSS class on wrapper (default: app-logo)
 *   $logoSize   - icon size in px (default: 32)
 *   $showText   - show wordmark beside icon (default: false)
 *   $textClass  - class for wordmark span
 */
$logoClass = $logoClass ?? 'app-logo';
$logoSize = isset($logoSize) ? (int) $logoSize : 32;
$showText = !empty($showText);
$textClass = $textClass ?? 'app-logo__text';
?>
<span class="<?= htmlspecialchars($logoClass, ENT_QUOTES, 'UTF-8'); ?>">
  <img
    class="app-logo__icon"
    src="/public/assets/logo.svg"
    alt=""
    width="<?= $logoSize ?>"
    height="<?= $logoSize ?>"
  />
  <?php if ($showText): ?>
  <span class="<?= htmlspecialchars($textClass, ENT_QUOTES, 'UTF-8'); ?>">
    Czas <span class="app-logo__accent">↔</span> Pieniądz
  </span>
  <?php endif; ?>
</span>
