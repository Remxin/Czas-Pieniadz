<?php
/**
 * Brand wordmark (public/assets/logo.svg).
 *
 * Optional vars:
 *   $logoClass  - extra CSS class on wrapper (default: app-logo)
 *   $logoWidth  - display width in px (default: 180)
 */
$logoClass = $logoClass ?? 'app-logo';
$logoWidth = isset($logoWidth) ? (int) $logoWidth : 180;
$logoAlt = $logoAlt ?? 'Czas ↔ Pieniądz';
?>
<span class="<?= htmlspecialchars($logoClass, ENT_QUOTES, 'UTF-8'); ?>" style="--logo-width: <?= $logoWidth ?>px">
  <img
    class="app-logo__img"
    src="/public/assets/logo.svg"
    alt="<?= htmlspecialchars($logoAlt, ENT_QUOTES, 'UTF-8'); ?>"
    width="<?= $logoWidth ?>"
    height="<?= (int) round($logoWidth / (500 / 150)) ?>"
  />
</span>
